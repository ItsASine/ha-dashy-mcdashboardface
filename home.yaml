title: Home Dashboard
views:
  - title: Home
    path: home
    type: sidebar
    badges: [ ]
    cards:
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:auto-entities
            show_empty: true
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - domain: person
                  options:
                    type: custom:mushroom-person-card
                    layout: horizontal
                    fill_container: true
                    primary_info: name
                    secondary_info: state
                    icon_type: entity-picture
                    tap_action:
                      action: more-info
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-title-card
            title: Living Room
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.living_room_temperature
                icon: mdi:thermometer
                icon_color: >
                  {% if states(entity) | float > 80 %}
                    red
                  {% elif states(entity) | float > 74 %}
                    yellow
                  {% else %}
                    green
                  {% endif %}
                primary: Temperature
                secondary: "{{ states(entity) }} °F"
                layout: vertical
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: sensor.living_room_humidity
                name: Humidity
                icon: mdi:water-percent
                icon_color: blue
                primary_info: name
                secondary_info: state
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.living_room_voc
                icon: mdi:check-circle
                icon_color: >
                  {% if states(entity) | float > 500 %}
                    red
                  {% elif states(entity) | float > 250 %}
                    yellow
                  {% else %}
                    green
                  {% endif %}
                primary: VOC
                secondary: "{{ states(entity) }} ppb"
                layout: vertical
                fill_container: true
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-light-card
                entity: light.living_room_main
                name: Light
              - type: custom:mushroom-fan-card
                entity: fan.living_room_ceiling
                name: Fan
              - type: custom:mushroom-entity-card
                entity: switch.living_room_heater
                name: Heater
