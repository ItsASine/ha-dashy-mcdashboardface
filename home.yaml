title: Home Dashboard
views:
  - title: Home
    path: home
    type: sidebar
    badges: [ ]
    cards:
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:auto-entities
            show_empty: true
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - domain: person
                  options:
                    type: custom:mushroom-person-card
                    layout: horizontal
                    fill_container: true
                    primary_info: name
                    secondary_info: state
                    icon_type: entity-picture
                    tap_action:
                      action: more-info
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-title-card
            title: Living Room
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - entity: sensor.living_room_temperature
                    state_not: unavailable
                  - entity: sensor.living_room_temperature
                    state_not: unknown
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.living_room_temperature
                  icon: mdi:thermometer
                  icon_color: >
                    {% if states(entity) | float > 80 %}
                      red
                    {% elif states(entity) | float > 74 %}
                      yellow
                    {% elif states(entity) | float > 66 %}
                      green
                    {% else %}
                      blue
                    {% endif %}
                  primary: Temperature
                  secondary: "{{ states(entity) }} °F"
                  layout: vertical
                  fill_container: true
                  tap_action:
                    action: more-info

              - type: conditional
                conditions:
                  - entity: sensor.living_room_humidity
                    state_not: unavailable
                  - entity: sensor.living_room_humidity
                    state_not: unknown
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.living_room_humidity
                  icon: mdi:water-percent
                  icon_color: >
                    {% if states(entity) | float > 70 %}
                      red
                    {% elif states(entity) | float > 60 %}
                      yellow
                    {% elif states(entity) | float > 30 %}
                      green
                    {% elif states(entity) | float > 25 %}
                      yellow
                    {% else %}
                      red
                    {% endif %}
                  primary: Humidity
                  secondary: "{{ states(entity) }} %"
                  layout: vertical
                  fill_container: true
                  tap_action:
                    action: more-info

              - type: conditional
                conditions:
                  - entity: sensor.living_room_voc
                    state_not: unavailable
                  - entity: sensor.living_room_voc
                    state_not: unknown
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.living_room_voc
                  icon: mdi:check-circle
                  icon_color: >
                    {% if states(entity) | float > 2000 %}
                      red
                    {% elif states(entity) | float > 250 %}
                      yellow
                    {% else %}
                      green
                    {% endif %}
                  primary: VOC
                  secondary: "{{ states(entity) }} ppb"
                  layout: vertical
                  fill_container: true
                  tap_action:
                    action: more-info
